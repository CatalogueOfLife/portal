<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="DC.identifier" scheme="DCTERMS.URI" content="urn:ISSN:2405-8858" />
  {% if page.seo_include %}
    <!-- Begin SEO -->
    {% include {{ page.seo_include }} %}
    <!-- End SEO -->
  {% else %}
    {% seo %}
  {% endif %}

  {% if page.noindex %}
  <meta name="robots" content="noindex">
  {% endif %}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.baseurl | prepend: site.url }}" />

  <link rel="stylesheet" href="{{ "/css/foundation.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="{{ "/css/style.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="{{ "/css/fontello.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="{{ "/css/custom.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/CatalogueOfLife/portal-components@v2.0.0-rc.3/umd/main.css">
  <link href="https://fonts.googleapis.com/css?family=Raleway:400,700,300" media="screen" rel="stylesheet" type="text/css" />

  <script src="{{ "/javascripts/libs.js" | prepend: site.baseurl }}" type="text/javascript"></script>
  <script src="{{ "/javascripts/masonry.pkgd.js" | prepend: site.baseurl }}" type="text/javascript"></script>
  <script src="{{ "/javascripts/imagesloaded.pkgd.min.js" | prepend: site.baseurl }}" type="text/javascript"></script>
  <script src="{{ "/javascripts/slick.min.js" | prepend: site.baseurl }}" type="text/javascript"></script>
  <script src="{{ "/javascripts/json2.js" | prepend: site.baseurl }}" type="text/javascript"></script>
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/CatalogueOfLife/portal-components@v2.0.0-rc.3/umd/col-browser.min.js" ></script>
  <script>
    window.ColBrowserPaths = {
      taxon:  '{{ site.react.pathToTaxon }}',
      tree:   '{{ site.react.pathToTree }}',
      search: '{{ site.react.pathToSearch }}',
      source: '{{ site.react.pathToDataset }}',
    };
    // Cross-component navigation must do a real page load (this portal is
    // multi-page Jekyll, not an SPA). withRouting's default onNavigateToX
    // uses history.pushState — fine for SPAs but leaves us stuck on the
    // current page. Override the four nav callbacks; let withRouting keep
    // hrefForX (anchor fallback) and the in-component state callbacks
    // (onExpandedTaxonKeyChange, onFiltersChange) on pushState.
    (function () {
      var P = window.ColBrowserPaths;
      function searchQuery(filters) {
        var params = new URLSearchParams();
        if (filters) Object.keys(filters).forEach(function (k) {
          var v = filters[k];
          if (Array.isArray(v)) v.forEach(function (x) { params.append(k, x); });
          else if (v != null && v !== '') params.append(k, v);
        });
        return params.toString();
      }
      window.ColBrowserNav = {
        onNavigateToTaxon:  function (id) { window.location.assign(P.taxon + id); },
        onNavigateToSource: function (id) { window.location.assign(P.source + id); },
        onNavigateToTree:   function (args) {
          var t = args && args.taxonKey;
          window.location.assign(P.tree + (t ? '?taxonKey=' + encodeURIComponent(t) : ''));
        },
        onNavigateToSearch: function (filters) {
          var q = searchQuery(filters);
          window.location.assign(P.search + (q ? '?' + q : ''));
        },
      };
    })();
  </script>
  <script defer data-domain="catalogueoflife.org" src="https://plausible.io/js/script.js"></script>
  <script>
    // terrificjs bootstrap
    (function($) {
        $(document).ready(function() {
            var $page = $('body');
            var config = {
              dependencyPath: {
                plugin: 'javascripts/'
              }
            }
            var application = new Tc.Application($page, config);
            application.registerModules();
            application.start();
        });
    })(Tc.$);
  </script>
</head>
