# Historical Catalogue of Life annual-checklist metrics, predating the
# ChecklistBank release series (which begins with the 2020-12 release).
# Collected ONCE as a static build asset for the "Changes over time" chart
# on /data/metrics — nothing here is fetched at build time.
#
# All are BASE-release figures (the annual checklists predate the Extended
# Release).
#   2000-2004 (Species 2000 editions; no 2001 edition): from their
#       ChecklistBank datasets COL00/COL02/COL03/COL04 (keys 315330-315333) —
#       family/genus/species = import taxaByRankCount; names = nameCount.
#   2005-2019: recomputed directly from the original annual-checklist MySQL
#   databases, using one consistent method:
#   2005-2011 (legacy schema): the `taxa` management-hierarchy table —
#       family/genus/species = rows with is_accepted_name=1 at that rank;
#       names = all rows (every rank, accepted + synonyms).
#   2012-2019 (normalised schema): the `taxon` table joined to
#       `taxonomic_rank` for family/genus/species; names = _totals
#       .scientific_names (accepted taxa at all ranks + synonyms).
# Species reproduce the published annual-checklist totals exactly for
# 2007-2019; 2005-2006 sit a little below the advertised headlines
# (">527,000", "884,552"), which added estimated species on top of the
# actual database content (511,637 / 883,234).
#
# Dates: 2000-2004 and 2012-2019 are the ChecklistBank dataset "issued" dates
# (the "2000" edition was issued 2001-02-14); 2005 is the database CD date;
# 2006-2011 are APPROXIMATE (spring; exact day not recorded). The 2020-12
# release onward comes from ChecklistBank, not here.

