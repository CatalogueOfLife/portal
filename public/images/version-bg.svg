<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstract dependency-graph network">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#04222e"/>
      <stop offset="0.55" stop-color="#0a3d4d"/>
      <stop offset="1" stop-color="#0d4a5f"/>
    </linearGradient>
    <radialGradient id="rightGlow" cx="0.7" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#1f7a8c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1f7a8c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5fc98a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5fc98a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#6bb6c9" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Field -->
  <rect width="1600" height="480" fill="url(#bg)"/>
  <rect width="1600" height="480" fill="url(#dots)"/>
  <rect width="1600" height="480" fill="url(#rightGlow)"/>

  <!-- Edges (dependency links) -->
  <g stroke="#6bb6c9" stroke-opacity="0.26" stroke-width="2">
    <line x1="620" y1="170" x2="760" y2="250"/>
    <line x1="640" y1="340" x2="760" y2="250"/>
    <line x1="760" y1="250" x2="900" y2="150"/>
    <line x1="760" y1="250" x2="920" y2="360"/>
    <line x1="760" y1="250" x2="1090" y2="250"/>
    <line x1="900" y1="150" x2="1090" y2="250"/>
    <line x1="920" y1="360" x2="1090" y2="250"/>
    <line x1="920" y1="360" x2="1100" y2="400"/>
    <line x1="1090" y1="250" x2="1270" y2="160"/>
    <line x1="1090" y1="250" x2="1290" y2="310"/>
    <line x1="1090" y1="250" x2="1100" y2="400"/>
    <line x1="1270" y1="160" x2="1290" y2="310"/>
    <line x1="1100" y1="400" x2="1290" y2="310"/>
    <line x1="1270" y1="160" x2="1450" y2="120"/>
    <line x1="1290" y1="310" x2="1460" y2="260"/>
    <line x1="1290" y1="310" x2="1260" y2="440"/>
    <line x1="1450" y1="120" x2="1460" y2="260"/>
    <line x1="1460" y1="260" x2="1440" y2="400"/>
    <line x1="1460" y1="260" x2="1560" y2="330"/>
    <line x1="1260" y1="440" x2="1440" y2="400"/>
  </g>

  <!-- Glow behind the green hubs -->
  <g>
    <circle cx="760" cy="250" r="48" fill="url(#nodeGlow)"/>
    <circle cx="1090" cy="250" r="44" fill="url(#nodeGlow)"/>
    <circle cx="1290" cy="310" r="40" fill="url(#nodeGlow)"/>
  </g>

  <!-- Nodes (packages) -->
  <g fill="#6bb6c9" fill-opacity="0.92">
    <circle cx="620" cy="170" r="6"/>
    <circle cx="640" cy="340" r="7"/>
    <circle cx="900" cy="150" r="9"/>
    <circle cx="920" cy="360" r="10"/>
    <circle cx="1270" cy="160" r="9"/>
    <circle cx="1100" cy="400" r="8"/>
    <circle cx="1260" cy="440" r="6"/>
    <circle cx="1450" cy="120" r="7"/>
    <circle cx="1460" cy="260" r="9"/>
    <circle cx="1440" cy="400" r="7"/>
    <circle cx="1560" cy="330" r="6"/>
  </g>
  <g fill="#5fc98a">
    <circle cx="760" cy="250" r="15"/>
    <circle cx="1090" cy="250" r="13"/>
    <circle cx="1290" cy="310" r="11"/>
  </g>
</svg>
